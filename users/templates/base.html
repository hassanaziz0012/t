{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">

    <!-- VideoJS -->
    <link href="https://vjs.zencdn.net/7.19.2/video-js.css" rel="stylesheet" />

    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/8f8a8c35a9.js" crossorigin="anonymous"></script>

    <!-- DeoVR Player -->
    <link rel="stylesheet" type="text/css" href="https://s3.deovr.com/version/1/css/styles.css"/>
    <script src="https://s3.deovr.com/version/1/js/bundle.js" async></script>

    <!-- Main Styles -->
    <link rel="stylesheet" href="{% static 'assets/css/main.css' %}">
    

    {% block css %}

    {% endblock css %}

</head>

<body>
    <nav class="navbar navbar-expand-lg d-flex flex-column">
            <div class="d-flex header-section">
                <img src="{{ header.file.url }}" alt="Header" class="header img-fluid">
            </div>

            <div class="d-flex justify-content-between nav">
                <li class="nav-item">
                    <button class="btn btn-dark">
                        <a class="nav-link" href="{% url '3d-videos' %}">VR Videos</a>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="btn btn-dark">
                        <a class="nav-link" href="{% url 'free-videos' %}">2D Videos</a>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="btn btn-dark">
                        <a class="nav-link" href="{% url 'girls-list' %}">Girls</a>
                    </button>
                </li>

                {% if request.user.is_authenticated %}
                
                <li class="nav-item">
                    <button class="btn btn-dark">
                        <a class="nav-link" href="{% url 'logout' %}">Log Out</a>
                    </button>
                </li>

                {% else %}

                <li class="nav-item">
                    <button class="btn btn-dark">
                        <a class="nav-link" href="{% url 'login' %}">Log In</a>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="btn btn-dark">
                        <a class="nav-link" href="{% url 'signup' %}">Join</a>
                    </button>
                </li>

                {% endif %}
            </div>
    </nav>

    {% block content %}

    {% endblock content %}

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
        crossorigin="anonymous"></script>

    <!-- VideoJS -->
    <script src="https://vjs.zencdn.net/7.19.2/video.min.js"></script>

</body>

</html>
