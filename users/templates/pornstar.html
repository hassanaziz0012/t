{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-12 container d-flex flex-column align-items-center">
        <h1 class="text-white">Videos of {{ pornstar.name }}</h1>
        <div class="pornstar-img">
            <img src="{{ pornstar.image.url }}" alt="{{ pornstar.name }} - Image" class="img-fluid thumbnail" style="object-fit: cover; width: 100%; height: 750px;"/>
        </div>
    </div>
    {% for video in videos %}
        <div class="col-md-3 mb-5" style="padding: 0;">
            <div class="card video">
                <a href="{% url 'video' id=video.id %}" class="thumbnail-link">
                    <div class="thumbnail img-fluid">
                        <img src="{{ video.thumbnail.url }}" alt="thumbnail" class="img-fluid">
                    </div>
                </a>

                <div class="card-body">
                    <h3 class="card-title">{{ video.title }}</h3>

                    <div class="pornstars">
                        {% for pornstar in video.pornstars.all %}
                            <span class="pornstar">{{ pornstar.name }}</span>
                        {% endfor %}
                    </div>
                </div>

            </div>
        </div>
    {% endfor %}
</div>
{% endblock content %}
