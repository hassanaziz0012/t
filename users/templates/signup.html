{% extends "base.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'assets/css/signup.css' %}">
{% endblock css %}

{% block content %}

<section class="signup mt-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <h1 class="text-center">Sign Up</h1>
            </div>
        </div>
        <div class="row">
            <form action="{% url 'signup' %}" method="post">
                <div class="col-lg-12 d-flex align-items-center justify-content-center flex-column">
                    {% csrf_token %}
                    <div class="form-group col-md-3">
                        <label for="email">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter email">
                    </div>
                    <hr>
                    <div class="form-group col-md-3">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password">
                    </div>
                    <div class="form-group col-md-3">
                        <label for="password_confirm">Confirm Password</label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" placeholder="Confirm Password">
                    </div>

                    <div class="form-group col-md-3 d-flex justify-content-center mt-3">
                        <button class="btn btn-dark">Sign Up</button>
                    </div>

                    {% if exists %}
                    <div class="form-group">
                        <p class="text-danger">This account already exists! If this is you, please 
                            <a href="{% url 'login' %}" class="white-link">Log In</a>
                        </p>
                    </div>
                    {% endif %}

                    <hr>
                    <p class="text-muted">Already have an account? <a class="white-link" href="{% url 'login' %}">Log In</a></p>
                </div>
            </form>
        </div>
    </div>
</section>

{% endblock content %}
